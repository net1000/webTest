upstream backend {
    server backend:3000;
}

upstream frontend {
    server frontend:5173;
}

# HTTP сервер для валидации ACME и редиректа
server {
    listen 80;
    server_name summer-camp-1.ru www.summer-camp-1.ru api.summer-camp-1.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # После получения сертификата раскомментируйте редирект:
    # return 301 https://$host$request_uri;
    
    # Временная заглушка до настройки HTTPS
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }
}

