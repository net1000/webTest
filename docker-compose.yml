services:
  # База данных PostgreSQL
  db:
    image: postgres:18-alpine
    container_name: camp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: camp_db
    volumes:
      # Для PG18+ том должен монтироваться в корень /var/lib/postgresql
      - pgdata:/var/lib/postgresql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d camp_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Бэкенд (Express + Node.js)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: camp-backend
    restart: unless-stopped
    environment:
      DB_USER: postgres
      DB_PASSWORD: 123456789
      DB_NAME: camp_db
      DB_HOST: db
      DB_PORT: 5432
      PORT: 3000
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app
      - backend_node_modules:/app/node_modules
      - ./server/uploads:/app/uploads

  # Фронтенд (Vue + Vite)
  frontend:
    build:
      context: ./camp
      dockerfile: Dockerfile.dev
    container_name: camp-frontend
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./camp:/app
      - frontend_node_modules:/app/node_modules

  # Nginx (Единая точка входа)
  nginx:
    image: nginx:alpine
    container_name: camp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./server/uploads:/app/uploads:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules: