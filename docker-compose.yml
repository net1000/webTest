services:
  # База данных PostgreSQL 18
  db:
    image: postgres:18-alpine
    container_name: camp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: camp_db
    volumes:
      # Для PG18+ том монтируется в корень /var/lib/postgresql
      - pgdata:/var/lib/postgresql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d camp_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Бэкенд (Express + Node.js)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: camp-backend
    restart: unless-stopped
    environment:
      DB_USER: postgres
      DB_PASSWORD: 123456789
      DB_NAME: camp_db
      DB_HOST: db
      DB_PORT: 5432
      PORT: 3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads

  # Фронтенд (Vue + Vite)
  frontend:
    build:
      context: ./camp
      dockerfile: Dockerfile.dev
    container_name: camp-frontend
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./camp:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # Nginx (Единая точка входа + SSL)
  nginx:
    image: nginx:alpine
    container_name: camp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./server/uploads:/app/uploads:ro
    depends_on:
      - backend
      - frontend

  # Certbot для получения SSL сертификатов
  certbot:
    image: certbot/certbot
    container_name: camp-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  frontend_node_modules: